<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day2-Registration form </title>
</head>
<body>
    <h1>Student registration form👨‍🎓</h1>
    <form action="">
        <label for="">Name:</label>
        <input type="text" name="" id="" placeholder="Enter name"><br><br>
        <label for="">Email:</label>
        <input type="email" name="" id="" placeholder="Enter Email"><br><br>
        <label for="">Password:</label>
        <input type="password" name="" id="" placeholder="Enter password"><br><br>
        <label for="">Phone Number:</label>
        <input type="tel" name="" id="" placeholder="Enter Phone number"><br><br>
        <label for="">Gender:</label>
        <input type="radio" name="gender" id=""> Male
        <input type="radio" name="gender" id=""> Female
        <input type="radio" name="gender" id=""> others <br><br>
        <label for="">Skills:</label>
        <input type="checkbox" name="Skills" id=""> HTML
        <input type="checkbox" name="Skills" id=""> CSS 
        <input type="checkbox" name="Skills" id=""> Python
        <input type="checkbox" name="Skills" id=""> Java
        <input type="checkbox" name="Skills" id=""> React <br><br>
        <label for="">City:</label>
        <select>
            <option value="">Select country</option>
            <option value="">Mumbai</option>
            <option value="">Indore</option>
            <option value="">Pune</option>
            <option value="">Gujrat</option>
            <option value="">Surat</option>
        </select><br><br>
        <label for="">Calender:</label>
        <input type="datetime-local" name="" id=""><br><br>
        <label for="">Comment:</label>
        <textarea name="" id="" rows="5" cols="30" placeholder="Share your views"></textarea>
    </form>
</body>
</html>
