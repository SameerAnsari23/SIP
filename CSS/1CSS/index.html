<!DOCTYPE html>
<html lang="en">
<head>
    <title>Selectors</title>
    <style>
        /* element selectors */
        div{
            color: blueviolet !important;
        }

        h1{
            color: blue;
            background-color: #FFE5B4;
        }


        /* class selector  */
        .who{
            color: red;
            text-align: center;
            text-transform: uppercase;
        }


        /* id selector  */
        #Akhtar{
            color: orangered;
            background-color: rgb(230, 14, 14);
        }


        /* universal selector  */
        *{
            /* background-color: yellow; */
        }
    </style>
</head>
<body>
    <h1 class="who">Yashwant Padhai kar lo</h1>
    <div class="who">
        I am kaun ?
    </div>
    <div>
        <H2 id="Akhtar">Sameer akhtar Gana mat gaao</H2>
    </div>
</body>
</html>
