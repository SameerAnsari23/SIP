<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid</title>
    <style>
        .container {
            display: grid;
            /* grid-template-columns: 200px 200px 200px 200px; */
            /* grid-template-columns: 1fr 1fr 1fr; */
            /* grid-template-rows: 1fr 1fr 1fr;  */
            /* height: 400px; */
            grid-template-columns: repeat(3, 1fr);
            /* grid-template-rows: repeat(3, 1fr); */
            /* grid-template-columns: minmax(5px, 300px); */
            gap: 100px;
        }
        .item{
            border: 1px solid black;
            height: 100px;
            width: 100px;
            display: flex;
            /* text-align: center; */
            justify-content: center;
            align-items: center;
        }
        #item5 {
            grid-area: 3/3;
            /* grid-template:minmax(30px); */
            grid-template-columns: minmax(100px, 800px);
        }
        #item4 {
            grid-area: 2/2;
        }
        #item2 {
            grid-area: 3/1;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="item">box 1</div>
        <div class="item" id="item2">box 2</div>
        <div class="item">box 3</div>
        <div class="item" id="item4">box 4</div>
        <div class="item" id="item5">box 5</div>
    </div>
</body>

</html>
