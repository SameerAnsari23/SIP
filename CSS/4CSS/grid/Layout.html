<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=\, initial-scale=1.0">
    <title>Actual use of grid</title>
    <style>
        .container {
            display: grid;
            /* height: 800px; */
            /* grid-template-columns: 1fr 1fr;  */
            /* grid-template-rows: repeat(3, 1fr);  */
            grid-template-areas: "nav nav nav"
                                 "side-content main-content main-content"
                                 "footer footer footer"
                                 
            ;
        }
        .item {
            border: 1px solid black;
            height: 100px;
            /*width: 100px; */
        }
        .item1 {
            background-color: aqua;
            grid-area: nav;
        }
        .item2 {
            background-color: aqua;
            grid-area: nav;
        }
        .item3 {
            background-color: orange;
            grid-area: side-content;
        }
        .item4 {
            background-color: blanchedalmond;
            grid-area: main-content;
        }
        .item5 {
            background-color: tomato;
            grid-area: footer;
        }
    
    </style>
</head>
<body>
    <div class="container">
        <div class="item item1">Box 1</div>
        <div class="item item2">Box 2</div>
        <div class="item item3">Box 3</div>
        <div class="item item4">Box 4</div>
        <div class="item item5">Box 5</div>
    </div>
</body>
</html>
