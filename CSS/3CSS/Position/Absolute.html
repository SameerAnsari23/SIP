<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Absolute</title>
    <style>
        div {
            border: 1px solid black;
            margin: 10px;
            height: 40px;
            width: 100px;
        }

        .rel {
            position: absolute;
            top: 10px;
            left: 100px;
        }
    </style>
</head>

<body>
    <div>
        Hello
    </div>
    <div class="grandparent">grandparent
        <div class="parent"> parent
            <div class="child"> child
                <div>Hello Buddy</div>
                <div class="rel">Hiiii !!!!</div>
                <div>Whatsapp bro...</div>
            </div>
        </div>
    </div>
</body>

</html>
