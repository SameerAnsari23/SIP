<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hindi to English Translator</title>

    <style>
        body{
    font-family: Arial;
    background:#f5f5f5;
}

.container{
    width:500px;
    margin:50px auto;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px gray;
}

textarea{
    width:100%;
    height:150px;
    margin:10px 0;
    padding:10px;
    font-size:18px;
}

button{
    width:100%;
    padding:12px;
    background:#1976d2;
    color:white;
    border:none;
    cursor:pointer;
    font-size:18px;
}

button:hover{
    background:#0d47a1;
}
    </style>
</head>
<body>

<div class="container">

    <h1>Hindi → English Translator</h1>

    <textarea
        id="inputText"
        placeholder="हिंदी में लिखें..."></textarea>

    <button id="translateBtn">
        Translate
    </button>

    <textarea
        id="outputText"
        placeholder="Translation..."
        readonly></textarea>

</div>

<script>
    const btn = document.getElementById("translateBtn");

btn.addEventListener("click", async () => {

    const text = document.getElementById("inputText").value;

    if(text===""){
        alert("Please enter Hindi text");
        return;
    }

    try{

        const response = await fetch("https://libretranslate.com/translate",{

            method:"POST",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify({

                q:text,

                source:"hi",

                target:"en",

                format:"text"

            })

        });

        const data = await response.json();

        document.getElementById("outputText").value =
        data.translatedText;

    }

    catch(err){

        console.log(err);

    }

});
</script>

</body>
</html>
